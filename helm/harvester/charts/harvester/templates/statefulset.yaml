# pv
{{- if and .Values.persistentvolume.create (not .Values.persistentvolume.existingClaim) }}
kind: PersistentVolume
apiVersion: v1
metadata:
  name: {{ include "harvester.fullname" . }}
  labels:
      {{- include "harvester.labels" . | nindent 4 }}
spec:
  storageClassName: {{ .Values.persistentvolume.class }}
  capacity:
    storage: {{ .Values.persistentvolume.size }}
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: {{ .Values.persistentvolume.path }}
---
# pv claim
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: {{ include "harvester.fullname" . }}
  labels:
    {{- include "harvester.labels" . | nindent 4 }}
spec:
  storageClassName: {{ .Values.persistentvolume.class }}
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.persistentvolume.size }}
  {{- if .Values.persistentvolume.selector }}
  selector:
    matchLabels:
      {{- include "harvester.selectorLabels" . | nindent 6 }}
  {{- end }}
---
{{- end }}
{{- if .Values.persistentvolume.create }}
# harvester wdirs
kind: PersistentVolume
apiVersion: v1
metadata:
  name: {{ include "harvester.fullname" . }}-wdirs
  labels:
      {{- include "harvester.labels-wdirs" . | nindent 4 }}
spec:
  storageClassName: {{ .Values.persistentvolume.class }}
  capacity:
    storage: {{ .Values.persistentvolumewdir.size }}
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: {{ .Values.persistentvolume.path }}
---
{{- end }}
{{- if not .Values.persistentvolumewdir.existingClaim }}
# pv claim
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: {{ include "harvester.fullname" . }}-wdirs
  labels:
    {{- include "harvester.labels-wdirs" . | nindent 4 }}
spec:
  storageClassName: {{ .Values.persistentvolume.class }}
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.persistentvolumewdir.size }}
  {{- if .Values.persistentvolume.selector }}
  selector:
    matchLabels:
      {{- include "harvester.selectorLabels-wdirs" . | nindent 6 }}
  {{- end }}
---
{{- end }}
# pv for condor logs
{{- if .Values.persistentvolumecondor.create }}
kind: PersistentVolume
apiVersion: v1
metadata:
  name: {{ include "harvester.fullname" . }}-condor-logs
  labels:
      {{- include "harvester.labels-condor-logs" . | nindent 4 }}
spec:
  storageClassName: {{ .Values.persistentvolumecondor.class }}
  capacity:
    storage: {{ .Values.persistentvolumecondor.size }}
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: {{ .Values.persistentvolumecondor.path }}
---
{{- end }}
{{- if not .Values.persistentvolumecondor.existingClaim }}
# pv claim for condor logs
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: {{ include "harvester.fullname" . }}-condor-logs
  labels:
    {{- include "harvester.labels-condor-logs" . | nindent 4 }}
spec:
  storageClassName: {{ .Values.persistentvolumecondor.class }}
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.persistentvolumecondor.size }}
  {{- if .Values.persistentvolumecondor.selector }}
  selector:
    matchLabels:
      {{- include "harvester.selectorLabels-condor-logs" . | nindent 6 }}
  {{- end }}
---
{{- end }}
{{- if .Values.sharedLogs.create }}
{{- if .Values.sharedLogs.shareID }}
# shared logs pv (static - existing Manila share)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.sharedLogs.name }}
spec:
  storageClassName: manila-meyrin-cephfs
  capacity:
    storage: {{ .Values.sharedLogs.size }}
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    namespace: {{ .Release.Namespace }}
    name: {{ .Values.sharedLogs.name }}
  csi:
    driver: cephfs.manila.csi.openstack.org
    volumeHandle: {{ .Values.sharedLogs.shareID }}
    nodeStageSecretRef:
      name: os-trustee
      namespace: kube-system
    nodePublishSecretRef:
      name: os-trustee
      namespace: kube-system
    controllerExpandSecretRef:
      name: os-trustee
      namespace: kube-system
    volumeAttributes:
      shareID: {{ .Values.sharedLogs.shareID }}
      shareAccessID: {{ .Values.sharedLogs.shareAccessID }}
      cephfs-mounter: fuse
---
# shared logs pvc (static)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.sharedLogs.name }}
spec:
  storageClassName: manila-meyrin-cephfs
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.sharedLogs.size }}
  volumeName: {{ .Values.sharedLogs.name }}
{{- else }}
# shared logs pvc (dynamic)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.sharedLogs.name }}
spec:
  storageClassName: {{ .Values.sharedLogs.storageClass }}
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.sharedLogs.size }}
{{- end }}
---
{{- end }}

# special mount data
{{- if .Values.persistentvolumespecial.mount }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
 name: {{ include "harvester.fullname" . }}-special-data
spec:
 storageClassName: {{ .Values.persistentvolumespecial.class }}
 accessModes:
  - ReadWriteMany
 resources:
  requests:
   storage: {{ .Values.persistentvolumespecial.size }}
---
{{- end }}

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "harvester.fullname" . }}
  labels:
    {{- include "harvester.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  updateStrategy:
    type: RollingUpdate
  serviceName: {{ include "harvester.fullname" . }}
  selector:
    matchLabels:
      {{- include "harvester.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "harvester.selectorLabels" . | nindent 8 }}
    spec:
      hostname:  {{ .Release.Name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "harvester.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- if .Values.noRoot }}
            # set non-zero GUID to run conder with non-root PID
            runAsGroup: 15678
            {{- if .Values.securityContext }}
            {{- toYaml .Values.securityContext | nindent 12 }}
            {{- end }}
            {{- else }}
            {{- toYaml .Values.securityContext | nindent 12 }}
            {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.enableProbe }}
          livenessProbe:
            exec:
              command:
                - cat
                - /var/log/panda/harvester_healthy
            initialDelaySeconds: 1800
            periodSeconds: 600
          {{- end }}
          {{- if .Values.autoStart }}
          command: ["/bin/sh", "-c"]
          args:
            - echo ${HARVESTER_DB_HOST};
              echo ${MARIADB_DATABASE};
              if [ ${HARVESTER_DB_HOST} != "localhost" ]; then while ! mysqladmin ping -h ${HARVESTER_DB_HOST} -u ${MARIADB_USER} -p${MARIADB_PASSWORD} --silent; do sleep 1; done; fi;
              cp /opt/harvester/sandbox/* /data/harvester/;
              chmod +x /data/harvester/init-harvester;
              chmod +x /data/harvester/run-harvester-crons;
              mkdir -p /opt/harvester/etc/auth_tokens;
              chmod 777 /opt/harvester/etc/auth_tokens;
              mkdir -p /data/tokens;
              chown atlpan:zp /data/tokens;
              echo "starting harvester service";
              {{- if .Values.noRoot }}
              /opt/harvester/etc/rc.d/init.d/run-harvester-services;
              {{- else }}
              chmod -R 777 /var/log/panda;
              chmod -R 777 /var/log/harvester_wdirs;
              chmod -R 777 /var/log/condor_logs;
              ln -s /var/log/condor_logs /var/www/html/;
              if [ -d ${SPECIAL_LOG_MOUNT_POINT} ]; then
                  ln -s ${SPECIAL_LOG_MOUNT_POINT} /var/www/html/condor_logs/;
              fi;
              runuser -u atlpan -g zp -- /opt/harvester/etc/rc.d/init.d/run-harvester-services;
              {{- end }}
              echo "done";
              sleep infinity & wait
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: https
              containerPort: 8443
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: {{ include "harvester.fullname" . }}-logs
              mountPath: /var/log/panda/
              {{- if .Values.persistentvolume.subPath }}
              subPath: {{ .Values.persistentvolume.subPath }}
              {{- end }}
            - name: {{ include "harvester.fullname" . }}-wdirs
              mountPath: /var/log/harvester_wdirs/
              {{- if .Values.persistentvolumewdir.subPath }}
              subPath: {{ .Values.persistentvolumewdir.subPath }}
              {{- end }}
            - name: {{ include "harvester.fullname" . }}-condor-logs
              mountPath: /var/log/condor_logs/
              {{- if .Values.persistentvolumecondor.subPath }}
              subPath: {{ .Values.persistentvolumecondor.subPath }}
              {{- end }}
            - name: {{ include "harvester.fullname" . }}-configjson
              mountPath: /opt/harvester/etc/configmap
            - name: {{ include "harvester.fullname" . }}-queueconfig
              mountPath: /opt/harvester/etc/queue_config_mount
            - name: {{ include "harvester.fullname" . }}-sandbox
              mountPath: /opt/harvester/sandbox
            - name: {{ include "harvester.fullname" . }}-auth
              mountPath: /opt/harvester/etc/auth
            - name: {{ include "harvester.fullname" . }}-cric-jsons-volume
              mountPath: /var/cric
            - name: {{ include "harvester.fullname" . }}-certs
              mountPath: /opt/harvester/etc/certs
            - name: {{ include "harvester.fullname" . }}-temp
              mountPath: /tmp
            {{- if .Values.persistentvolumespecial.mount }}
            - name: {{ include "harvester.fullname" . }}-special-data
              mountPath: {{ .Values.persistentvolumespecial.path }}
            {{- end }}
            {{- if .Values.cvmfs.enabled }}
            {{- range .Values.cvmfs.repositories }}
            - name: cvmfs-{{ .name }}
              mountPath: /cvmfs/{{ .repository }}
            {{- end }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "harvester.fullname" . }}-env
            - secretRef:
                name: {{ .Values.global.secret }}-harvester-envs
          {{- if .Values.global.deploymentName }}
          env:
            - name: "HARVESTER_ID"
              value: "{{ .Values.global.deploymentName }}"
            - name: "HARVESTER_DB_HOST"
              value: "{{ .Values.global.deploymentName }}-mariadb"
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: {{ include "harvester.fullname" . }}-configjson
          configMap:
            name: {{ include "harvester.fullname" . }}-configjson
        - name: {{ include "harvester.fullname" . }}-queueconfig
          configMap:
            name: {{ include "harvester.fullname" . }}-queueconfig
        - name: {{ include "harvester.fullname" . }}-sandbox
          configMap:
            name: {{ include "harvester.fullname" . }}-sandbox
        - name: {{ include "harvester.fullname" . }}-auth
          secret:
              secretName: {{ .Values.global.secret }}-harvester-auth
        - name: {{ include "harvester.fullname" . }}-condor-logs
          persistentVolumeClaim:
            claimName: {{ .Values.persistentvolumecondor.existingClaim | default (printf "%s-condor-logs" (include "harvester.fullname" .)) }}
        {{- if .Values.persistentvolumespecial.mount }}
        - name: {{ include "harvester.fullname" . }}-special-data
          persistentVolumeClaim:
            claimName: {{ include "harvester.fullname" . }}-special-data
        {{- end }}
        - name: {{ include "harvester.fullname" . }}-cric-jsons-volume
          secret:
              secretName: {{ .Values.global.secret }}-cric-jsons
              optional: true
        - name: {{ include "harvester.fullname" . }}-certs
          secret:
              secretName: {{ .Values.global.secret }}-harvester-certs
        - name: {{ include "harvester.fullname" . }}-temp
          emptyDir: {}
        - name: {{ include "harvester.fullname" . }}-wdirs
          persistentVolumeClaim:
            claimName: {{ .Values.persistentvolumewdir.existingClaim | default (printf "%s-wdirs" (include "harvester.fullname" .)) }}
        {{- if .Values.cvmfs.enabled }}
        {{- range .Values.cvmfs.repositories }}
        - name: cvmfs-{{ .name }}
          persistentVolumeClaim:
            claimName: {{ include "harvester.fullname" $ }}-cvmfs-{{ .name }}
            readOnly: true
        {{- end }}
        {{- end }}
  {{- if .Values.persistentvolume.existingClaim }}
        - name: {{ include "harvester.fullname" . }}-logs
          persistentVolumeClaim:
            claimName: {{ .Values.persistentvolume.existingClaim }}
  {{- else if .Values.persistentvolume.create }}
        - name: {{ include "harvester.fullname" . }}-logs
          persistentVolumeClaim:
            claimName: {{ include "harvester.fullname" . }}
  {{- else }}
  volumeClaimTemplates:
    - metadata:
        name: {{ include "harvester.fullname" . }}-logs
      spec:
        storageClassName: {{ .Values.persistentvolume.class }}
        accessModes:
          - "ReadWriteOnce"
        resources:
          requests:
            storage: {{ .Values.persistentvolume.size }}
  {{- end }}
