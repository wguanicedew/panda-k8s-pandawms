# pv
{{- if .Values.persistentvolume.create }}
kind: PersistentVolume
apiVersion: v1
metadata:
  name: {{ include "jedi.fullname" . }}
  labels:
      {{- include "jedi.labels" . | nindent 4 }}
spec:
  storageClassName: {{ .Values.persistentvolume.class }}
  capacity:
    storage: {{ .Values.persistentvolume.size }}
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: {{ .Values.persistentvolume.reclaimPolicy | default "Retain" }}
  hostPath:
    path: {{ .Values.persistentvolume.path }}
---
# pv claim
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: {{ include "jedi.fullname" . }}
  labels:
    {{- include "jedi.labels" . | nindent 4 }}
spec:
  storageClassName: {{ .Values.persistentvolume.class }}
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.persistentvolume.size }}
  {{- if .Values.persistentvolume.selector }}
  selector:
    matchLabels:
      {{- include "jedi.selectorLabels" . | nindent 6 }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "jedi.fullname" . }}
  labels:
    {{- include "jedi.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  serviceName: {{ include "jedi.fullname" . }}
  selector:
    matchLabels:
      {{- include "jedi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "jedi.selectorLabels" . | nindent 8 }}
    spec:
      hostname:  {{ .Release.Name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "jedi.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.autoStart }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ "${PANDA_DB_BACKEND}" = "postgres" ]; then
                until /usr/pgsql-*/bin/pg_isready -h ${PANDA_DB_HOST} -p ${PANDA_DB_PORT}; do echo waiting for database; sleep 2; done;
              fi;
              cp /opt/panda/sandbox/* /data/panda/;
              chmod +x /data/panda/init-jedi;
              chmod +x /data/panda/run-jedi-crons;
              chmod +x /data/panda/run-jedi-services;              
              /opt/panda/bin/python /data/panda/process_template.py;
              /data/panda/run-jedi-services;
              sleep infinity & wait
          {{- end }}
          ports:
            - name: http
              containerPort: 25080
              protocol: TCP
            - name: https
              containerPort: 25443
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - test
                - -f
                - /var/log/panda/panda_jedi_stdout.log
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "test -f /var/run/panda/panda_jedi.pid && kill -0 $(cat /var/run/panda/panda_jedi.pid)"
            initialDelaySeconds: 120
            periodSeconds: 60
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
              - name: {{ include "jedi.fullname" . }}-logs
                mountPath: /var/log/panda
                {{- if .Values.persistentvolume.subPath }}
                subPath: {{ .Values.persistentvolume.subPath }}
                {{- end }}
              - name: {{ include "jedi.fullname" . }}-configjson
                mountPath: /opt/panda/etc/config_json
              - name: {{ include "jedi.fullname" . }}-sandbox
                mountPath: /opt/panda/sandbox
              - name: {{ include "jedi.fullname" . }}-certs
                mountPath: /opt/panda/etc/cert
              {{- if .Values.cvmfs.enabled }}
              {{- range .Values.cvmfs.repositories }}
              - name: cvmfs-{{ .name }}
                mountPath: /cvmfs/{{ .repository }}
              {{- end }}
              {{- end }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-server-env
            - secretRef:
                name: {{ .Values.global.secret }}-panda-envs
          env:
            # set no_proxy since $() is resolved not in envFrom section
            - name: no_proxy
              value: $(no_proxy),$(PANDA_IDDS_HOST)
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: {{ include "jedi.fullname" . }}-certs
          secret:
              secretName: {{ .Values.global.secret }}-panda-certs
        - name: {{ include "jedi.fullname" . }}-sandbox
          projected:
            sources:
              - configMap:
                  name: {{ include "jedi.fullname" . }}-sandbox
              - configMap:
                  name: {{ .Release.Name }}-external-sandbox
              - configMap:
                  name: {{ .Release.Name }}-server-sandbox
              - secret:
                  name: {{ .Values.global.secret }}-panda-token-cache
        - name: {{ include "jedi.fullname" . }}-configjson
          projected:
            sources:
              - configMap:
                  name: {{ include "jedi.fullname" . }}-configjson
              - configMap:
                  name: {{ .Release.Name }}-server-configjson
        {{- if .Values.cvmfs.enabled }}
        {{- range .Values.cvmfs.repositories }}
        - name: cvmfs-{{ .name }}
          persistentVolumeClaim:
            claimName: {{ include "jedi.fullname" $ }}-cvmfs-{{ .name }}
            readOnly: true
        {{- end }}
        {{- end }}
  {{- if .Values.persistentvolume.create }}
        - name: {{ include "jedi.fullname" . }}-logs
          persistentVolumeClaim:
            claimName: {{ include "jedi.fullname" . }}
  {{- else if .Values.persistentvolume.sharedPvcName }}
        - name: {{ include "jedi.fullname" . }}-logs
          persistentVolumeClaim:
            claimName: {{ .Values.persistentvolume.sharedPvcName }}
  {{- else }}
  volumeClaimTemplates:
    - metadata:
        name: {{ include "jedi.fullname" . }}-logs
      spec:
        storageClassName: {{ .Values.persistentvolume.class }}
        accessModes:
          - "ReadWriteOnce"
        resources:
          requests:
            storage: {{ .Values.persistentvolume.size }}
  {{- end }}
