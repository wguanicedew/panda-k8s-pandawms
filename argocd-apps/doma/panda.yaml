apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: panda
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/PanDAWMS/panda-k8s.git
    targetRevision: main
    path: helm/panda
    helm:
      valueFiles:
        - values.yaml
        - values/values-cern.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: panda-external-sandbox
      jsonPointers:
        - /binaryData
    - group: apps
      kind: StatefulSet
      name: panda-server
      jsonPointers:
        - /spec/volumeClaimTemplates
    - group: apps
      kind: StatefulSet
      name: panda-jedi
      jsonPointers:
        - /spec/volumeClaimTemplates
